<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="0; url=/chusho/">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="/chusho/">
  <title>404 - Redirecting…</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif; display: grid; place-items: center; height: 100vh; }
    .box { text-align: center; }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>ページが見つかりませんでした。アプリに戻ります…</p>
    <p><a href="/chusho/">/chusho/ に戻る</a></p>
  </div>
  <script>
    // 履歴API系の直リンクに来た場合でも index へ戻す保険
    (function () {
      var target = "/chusho/";
      if (location.pathname && !location.pathname.endsWith("/chusho/")) {
        // ハッシュやクエリを維持したい場合はここで連結
        var qs = location.search || "";
        var hash = location.hash || "";
        location.replace(target + qs + hash);
      }
    })();
  </script>
</body>
</html>
